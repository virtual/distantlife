{% extends "layout.html" %}

{% block title %}
{{ _('Profile') }}  
{% endblock %}

{% block main %}
    <dl class="list-inline">
        <dt>{{ _('Username') }}:</dt>
        <dd>{{ userinfo.username }} <small>({{ _('ID') }}: {{ userinfo.id }})</small></dd>
    </dl>

    <form class="mx-auto centered" action="/updatelanguage" method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
      <fieldset>
          <legend>{{ _('Language Preferences') }}</legend>
          <div class="form-group">
            <label for="orig_language">{{ _('My native language is') }}:</label>
            <select id="orig_language" name="orig_language">
              {% for lang in language_options %}
                {% if lang.id == userinfo.preferred_lang %}
                  <option selected data-char="{{ lang.charcode }}" value="{{ lang.id }}">{{ lang.name }}</option>
                {% else %}
                  <option data-char="{{ lang.charcode }}" value="{{ lang.id }}">{{ lang.name }}</option>
                {% endif %}
              {% endfor %}
            </select>
          </div>
          <div class="form-group">
            <label for="learning_lang">{{ _('I want to learn') }}:</label>
            <select id="learning_lang" name="learning_lang">
              {% for lang in language_options %}
                {% if lang.id == userinfo.learning_lang %}
                  <option selected data-char="{{ lang.charcode }}" value="{{ lang.id }}">{{ lang.name }}</option>
                {% else %}
                  <option data-char="{{ lang.charcode }}" value="{{ lang.id }}">{{ lang.name }}</option>
                {% endif %}
              {% endfor %}
            </select>
          </div>
          <button class="btn btn-primary" type="submit">{{ _('Save Preferences') }}</button>
      </fieldset>
    </form>

    <form class="mx-auto centered" action="/updatepassword" method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
        <fieldset>
            <legend>{{ _('Change password') }}</legend>
            <div class="form-group">
              <label for="current_password">{{ _('Current Password') }}</label>
              <input class="form-control has-password-toggle" name="current_password" id="current_password" placeholder="{{ _('Current Password') }}" type="password">
              <button
                type="button"
                class="password-toggle"
                data-toggle-password="current_password"
                data-show-label="{{ _('Show password') }}"
                data-hide-label="{{ _('Hide password') }}"
                aria-controls="current_password"
                aria-label="{{ _('Show password') }}"
                aria-pressed="false"
              >
                <span class="far fa-eye" aria-hidden="true"></span>
                <span class="sr-only">{{ _('Show password') }}</span>
              </button>
            </div>
            <div class="form-group">
              <label for="password">{{ _('Password') }}</label>
              <input class="form-control has-password-toggle" name="password" id="password" placeholder="{{ _('Password') }}" type="password">
              <button
                type="button"
                class="password-toggle"
                data-toggle-password="password"
                data-show-label="{{ _('Show password') }}"
                data-hide-label="{{ _('Hide password') }}"
                aria-controls="password"
                aria-label="{{ _('Show password') }}"
                aria-pressed="false"
              >
                <span class="far fa-eye" aria-hidden="true"></span>
                <span class="sr-only">{{ _('Show password') }}</span>
              </button>
            </div>
            <div class="form-group">
              <label for="confirmation">{{ _('Retype Password') }}</label>
              <input class="form-control has-password-toggle" name="confirmation" id="confirmation" placeholder="{{ _('Retype Password') }}" type="password">
              <button
                type="button"
                class="password-toggle"
                data-toggle-password="confirmation"
                data-show-label="{{ _('Show password') }}"
                data-hide-label="{{ _('Hide password') }}"
                aria-controls="confirmation"
                aria-label="{{ _('Show password') }}"
                aria-pressed="false"
              >
                <span class="far fa-eye" aria-hidden="true"></span>
                <span class="sr-only">{{ _('Show password') }}</span>
              </button>
            </div>
            <button class="btn btn-primary" type="submit">{{ _('Update Password') }}</button>
        </fieldset>
    </form>
{% endblock %}
